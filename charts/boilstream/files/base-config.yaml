# BoilStream Default Configuration
# This configuration provides a working out-of-the-box experience
# - DuckDB persistence enabled for local data storage
# - NoOp primary storage (no external dependencies)
# - PGWire enabled for SQL queries on port 5432
# - Kafka enabled for producer ingestion on port 9092
# - All data stored locally under /tmp

# AWS Configuration (not used with NoOp storage)
aws:
  region: "us-east-1"
  https_conn_pool_size: 100

# Storage Configuration - NoOp storage for zero dependencies
storage:
  backends:
    - name: "noop-primary"
      backend_type: "noop"
      enabled: true
      primary: true  # Primary backend - no actual storage
    # Example: Local MinIO S3 configuration (disabled by default)
    # - name: "local-minio"
    #   backend_type: "s3"
    #   enabled: false
    #   primary: false
    #   endpoint: "http://localhost:9000"
    #   access_key: "minioadmin"
    #   secret_key: "minioadmin"
    #   region: "us-east-1"
    #   use_path_style: true  # Required for MinIO
    #   bucket: "boilstream-data"
    #   prefix: "/"
    #   max_concurrent_uploads: 100
    #   max_retries: 3
    #   initial_backoff_ms: 100
    #   max_retry_attempts: 3
    # Example: Real AWS S3 configuration (disabled by default)
    # - name: "aws-s3"
    #   backend_type: "s3"
    #   enabled: false
    #   primary: false
    #   region: "us-west-2"
    #   bucket: "your-bucket-name"
    #   prefix: "/data"
    #   # access_key and secret_key can be omitted to use IAM roles/AWS CLI credentials
    #   # access_key: "your-access-key"
    #   # secret_key: "your-secret-key"
    #   max_concurrent_uploads: 100
    #   max_retries: 3
    #   initial_backoff_ms: 100
    #   max_retry_attempts: 3
    # Example: Azure Blob Storage configuration (disabled by default)
    # - name: "azure-blob"
    #   backend_type: "azure"
    #   enabled: false
    #   primary: false
    #   azure_account: "mystorageaccount"
    #   azure_container: "boilstream-data"
    #   prefix: "/data"
    #   # azure_access_key: "your-access-key"  # Optional, uses Azure SDK credentials if not specified
    # Example: Google Cloud Storage configuration (disabled by default)
    # - name: "gcp-storage"
    #   backend_type: "gcp"
    #   enabled: false
    #   primary: false
    #   bucket: "boilstream-data-gcs"
    #   prefix: "/data"
    #   gcp_project_id: "your-gcp-project"
    #   # gcp_service_account_key: "/path/to/service-account.json"  # Optional, uses default credentials if not specified
    # Example: Filesystem storage (disabled by default)
    # - name: "local-filesystem"
    #   backend_type: "filesystem"
    #   enabled: false
    #   primary: false
    #   prefix: "/tmp/boilstream/storage"

# Server Configuration
server:
  flight_base_port: 50050
  consumer_flight_port: 50250  # Consumer Flight port for data consumption
  router:
    spsc_queue_capacity: 2
    batch_size: 200
    retry_delay_ms: 1

# Data Processing Configuration
processing:
  data_processing_threads: 4
  buffer_pool_max_size: 50
  window_queue_capacity: 30000
  max_flush_latency_ms: 1000     # Max time before flush/upload
  max_part_size_mb: 8            # Size threshold for early flush
  max_file_size_mb: 100          # Max file size before forced completion
  enable_5mb_part_padding: false # Pad buffers to 5MB for S3 multipart (false = direct upload for small parts)
  include_metadata_columns: true
  schema_validation_enabled: true
  parquet:
    compression: "ZSTD"
    dictionary_enabled: true

# DuckDB Topic Persistence Configuration - ENABLED for local storage
duckdb_persistence:
  enabled: true
  storage_path: "/tmp/boilstream/duckdb"
  max_writers: 10

# Embedded PostgreSQL Configuration for DuckLake metadata catalogs
# Automatically starts a PostgreSQL instance for DuckLake metadata storage
embedded_postgres:
  enabled: true  # Enable for local development with DuckLake
  port: 5433     # Port for PostgreSQL (default: 5433)
  databases:     # Databases to create on startup
    - "ducklake_catalog"    # Shared catalog database with schema-per-catalog isolation (REQUIRED for CDC)
    - "ducklake_analytics"  # Optional: Analytics database
    - "ducklake_default"    # Optional: Default database

# DuckLake Configuration for ACID transactions and metadata management
# Note: Requires DuckLake extension to be available in DuckDB
# ducklake:
#   - name: my_ducklake
#     # Data path where Parquet files are stored (must match storage backend path)
#     # For reconciliation and configuration validation (we don't want to try to parse the SQL to find the data path)
#     data_path: "s3://ingestion-data/"
#     # See https://ducklake.select/docs/stable/duckdb/usage/connecting#parameters
#     attach: |
#       FROM duckdb_secrets();
#       -- Load extensions
#       INSTALL ducklake;
#       INSTALL postgres;
#       INSTALL aws;
#       INSTALL httpfs;
#       LOAD ducklake;
#       LOAD postgres;
#       LOAD aws;
#       LOAD httpfs;
#       -- S3 access for MinIO
#       CREATE OR REPLACE SECRET secretForDirectS3Access (
#           TYPE S3,
#           KEY_ID 'minioadmin',
#           SECRET 'minioadmin',
#           REGION 'us-east-1',
#           ENDPOINT 'localhost:9000',
#           USE_SSL false,
#           URL_STYLE 'path',
#           SCOPE 's3://ingestion-data/'
#       );
#       -- PostgreSQL secret for DuckLake catalog backend
#       CREATE OR REPLACE SECRET postgres (
#         TYPE POSTGRES,
#         HOST 'localhost',
#         PORT 5433,
#         DATABASE 'boilstream',
#         USER 'postgres',
#         PASSWORD 'postgres'
#       );
#       -- DuckLake Postgres catalog
#       CREATE OR REPLACE SECRET pg_secret (
#         TYPE DUCKLAKE,
#         METADATA_PATH '',
#         DATA_PATH 's3://ingestion-data/',
#         METADATA_PARAMETERS MAP {'TYPE': 'postgres', 'SECRET': 'postgres'}
#       );
#       -- DuckLake attachment with Postgres catalog
#       ATTACH 'ducklake:pg_secret' AS my_ducklake;
#     # Optional: Specify which topics to include (if not specified, all topics are included)
#     # topics: ["events", "people"]
#     # Reconciliation settings for ensuring S3 and DuckLake are synchronized
#     reconciliation:
#       on_startup: true                  # Run reconciliation when application starts
#       interval_minutes: 10              # Check for missing files
#       max_concurrent_registrations: 10  # Parallel registration limit

# PGWire PostgreSQL Protocol Configuration - ENABLED
pgwire:
  enabled: true
  port: 5432
  refresh_interval_seconds: 10
  metadata_db_path: "/tmp/boilstream/metadata.duckdb"
  initialization_sql: |
    SET threads = 8;
    SET memory_limit = '24GB';
    SET max_temp_directory_size = '16GB';
    SET allowed_directories = ['/tmp'];
    SET allow_unsigned_extensions = false;
    SET allow_persistent_secrets = false;
    SET allow_unredacted_secrets = false;
    INSTALL json;
    LOAD json;
    INSTALL ducklake;
    LOAD ducklake;
    INSTALL boilstream FROM community;
    LOAD boilstream;
    SET lock_configuration = true;
  # Connection Management and Robustness Settings
  query_timeout_seconds: 300        # 5 minutes - maximum time for a single query
  max_connections: 100              # Maximum number of concurrent connections
  idle_timeout_seconds: 900         # 15 minutes - idle connections cleanup interval (must be >= 2x query_timeout)
  connection_timeout_seconds: 1800  # 30 minutes - maximum time a connection can be active (for long downloads)
  init_timeout_seconds: 30          # 30 seconds - maximum time for connection initialization (user lookup, bootstrap, catalog attach)
  # Metadata database backup configuration (optional)
  # metadata_backup_backend: "noop-primary"  # References a storage backend name from storage.backends
  # metadata_backup_interval_seconds: 60     # How often to backup (default: 60)
  # metadata_backup_path: "pgwire/metadata-backup.tar.gz"  # Path in backend for backup (encrypted Parquet export)
  # Multi-tenant isolation: base path for tenant data directories
  # Each tenant gets a chroot to {tenant_data_base_path}/{tenant_id}/
  tenant_data_base_path: "/tmp/boilstream/tenants"
  tls:
    enabled: false  # Disabled for development
    # For production, enable TLS and provide certificates:
    # cert_path: "/path/to/pgwire_cert.pem"
    # key_path: "/path/to/pgwire_key.pem"
    # Or use PEM strings directly:
    # cert_pem: "-----BEGIN CERTIFICATE-----\n..."
    # key_pem: "-----BEGIN PRIVATE KEY-----\n..."

# Kafka Producer Protocol Configuration
# Supports SASL_SSL authentication using web tokens from dashboard
kafka:
  enabled: true
  port: 9092
  bind_address: "0.0.0.0"
  tls:
    enabled: false  # Enable for production with SASL_SSL
    # Provide certificates via files:
    # cert_path: "/path/to/kafka_cert.pem"
    # key_path: "/path/to/kafka_key.pem"
    # Or use PEM strings directly (for K8s secrets, etc.):
    # cert_pem: "-----BEGIN CERTIFICATE-----\n..."
    # key_pem: "-----BEGIN PRIVATE KEY-----\n..."
  # Note: When auth_server is enabled, Kafka uses SASL/PLAIN with web tokens
  # Client config: security.protocol=SASL_SSL, sasl.mechanism=PLAIN
  # sasl.username=<topic_name>, sasl.password=<web_token_from_dashboard>

