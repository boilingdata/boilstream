  #   # Users must be members of at least one listed org to access
  #   allowed_orgs:
  #     - "your-org-name"
  #     - "another-allowed-org"
  #   # Map GitHub teams to database roles (admin, write, read)
  #   # Format: "org-name/team-slug": "role"
  #   # Users get all roles from their team memberships
  #   team_role_mappings:
  #     "your-org-name/admin-team": "admin"
  #     "your-org-name/engineering": "write"
  #     "your-org-name/support": "read"
  #     "another-allowed-org/developers": "write"
  #   # Always fetch orgs/teams for audit logging even without RBAC (default: false)
  #   audit_org_teams: false

  # Google OAuth Configuration
  # google:
  #   client_id: "${GOOGLE_CLIENT_ID}"
  #   client_secret: "${GOOGLE_CLIENT_SECRET}"
  #   redirect_uri: "https://yourdomain.com/auth/callback"
  #   allowed_domains: ["yourdomain.com"]  # List of allowed email domains

