# Rate Limiting Configuration
rate_limiting:
  disabled: false
  max_requests: 1000
  burst_limit: 1500
  global_limit: 5000

# TLS Configuration
tls:
  disabled: true  # Disabled for development
  # cert_path: "/path/to/cert.pem"
  # key_path: "/path/to/key.pem"
  # cert_pem: "-----BEGIN CERTIFICATE-----\n..."
  # key_pem: "-----BEGIN PRIVATE KEY-----\n..."
  # grpc_default_ssl_roots_file_path: "/path/to/ca-certificates.crt"

# Authentication Configuration - Disabled for development
auth:
  providers: []
  authorization_enabled: false
  admin_groups: []
  read_only_groups: []
  max_sessions_per_hour: 1000  # Rate limit for session creation per user
  max_concurrent_sessions: 20  # Maximum active sessions per user
  max_session_ttl_hours: 8     # Maximum session lifetime in hours
  cognito:
    # user_pool_id: "us-east-1_example"
    # region: "us-east-1"
    # audience: "client-id"
  azure:
    # tenant_id: "tenant-id"
    # client_id: "client-id"
    allow_multi_tenant: false
  gcp:
    # client_id: "client-id"
    # project_id: "project-id"
    require_workspace_domain: false
  auth0:
    # tenant: "your-tenant.auth0.com"
    # audience: "your-api-identifier"
    # groups_namespace: "https://your-app.com/groups"
  okta:
    # org_domain: "your-org.okta.com"
    # audience: "api://your-audience"
    # auth_server_id: "your-auth-server"

# Metrics Configuration
metrics:
  port: 8081
  flush_interval_ms: 1000

# Logging Configuration
logging:
  rust_log: "info"

# Audit Logging Configuration - SOC2/ISO Compliance
audit:
  enabled: false  # Disabled by default for backward compatibility
  backend: ndjson  # Options: ndjson, duckdb (future), s3 (future), disabled
  log_path: "./logs/audit"  # Base directory for Hive partitioning (year=YYYY/month=MM/day=DD/hour=HH/audit.ndjson)
  buffer_size: 1000  # Events to batch before flushing
  sample_rate: null  # Optional sampling (0.0-1.0, null = no sampling)
  include_query_text: true  # Include SQL queries in logs (may contain PII)
  include_ip_address: true  # Include client IP addresses (may be PII)

# HTTP Ingestion Configuration (Browser-based Arrow data)
http_ingestion:
  enabled: false  # Disabled by default, enable for browser ingestion
  port: 443
  bind_address: "0.0.0.0"
  
  # TLS configuration (required when enabled)
  tls:
    cert_path: "./test-certs/localhost.crt"
    key_path: "./test-certs/localhost.key"
  
  # CORS configuration for browser access
  cors:
    allowed_origins:
      - "https://app.example.com"
      - "https://dashboard.example.com"
    max_age_seconds: 3600
    allow_credentials: false
  
  # Rate limiting per tenant
  rate_limiting:
    enabled: true
    global_requests_per_second: 10000  # Total across all tenants
    tenant_requests_per_second: 1000   # Default per tenant
    tenant_burst_size: 5000            # Burst capacity per tenant
    tenant_overrides: {}                # Custom limits per tenant_id
      # Example overrides:
      # 1:  # tenant_id 1
      #   requests_per_second: 2000
      #   burst_size: 10000
  
  # HTTP/2 settings optimized for browser connections
  http2:
    max_connections: 100000                    # Max concurrent connections
    accept_threads: 0                          # 0 = number of CPU cores
    initial_stream_window_size: 262144         # 256KB for up to 128KB packets
    initial_connection_window_size: 1048576    # 1MB for multiple streams
    max_frame_size: 131072                     # 128KB frames
    max_concurrent_streams: 50                 # Per connection
    keep_alive_interval_secs: 20
    keep_alive_timeout_secs: 10
  
  # Secret key for token validation (32 bytes, base64 encoded)
  # Generate with: openssl rand -base64 32
  token_secret_key: "CHANGE_THIS_SECRET_KEY_BASE64_ENCODED_32_BYTES"
  
  # Maximum request size (128KB for browser compatibility)
  max_request_size: 131072
  
  # Memory pool configuration for zero-copy buffer management
  memory_pool:
    buffer_size: 131072    # 128KB per buffer (typical browser payload size)
    buffer_count: 2000     # 2000 buffers = 256MB total memory pool

# Authentication Server Configuration
# Provides OAuth-based authentication for generating temporary PGWire credentials
auth_server:
  enabled: true  # Set to true to enable auth server
  enable_ducklake: true
  auto_create_default_ducklake: true  # Auto-create "duckie" catalog for new users
  port: 443      # HTTPS port for auth landing page
  tls_cert: "./test-certs/localhost.crt"
  tls_key: "./test-certs/localhost.key"

  # TLS Certificate Auto-Reload (for Let's Encrypt / certbot)
  # Monitors certificate files for changes and reloads without server restart
  # tls_auto_reload: true  # Enable/disable auto-reload (default: true when certs configured)
  # tls_reload_check_interval_seconds: 21600  # Check every 6 hours (default: 21600)
  # Let's Encrypt certificates are valid for 90 days and renewed at 30 days remaining
  # Certbot runs twice daily, so checking every 6-12 hours is optimal
  # Example for Let's Encrypt with certbot:
  # tls_cert: "/etc/letsencrypt/live/app.boilstream.com/fullchain.pem"
  # tls_key: "/etc/letsencrypt/live/app.boilstream.com/privkey.pem"

  # Note: Static web UI files (HTML, CSS, JS) are embedded in the binary at compile time
  # No external files are needed at runtime - single binary deployment!

  session_ttl_hours: 8            # TTL for generated PGWire credentials
  users_db_path: "data/users.duckdb"  # Database for user profiles and OAuth sessions
  encryption_key_path: "data/encryption.key"  # Encryption key file (auto-generated on first run)

  # Superadmin automated setup (optional - for testing/automation)
  # If these files exist, superadmin credentials are loaded from them on startup
  # If empty or files don't exist, superadmin setup is done interactively or skipped
  superadmin_password_path: "data/superadmin_password.txt"
  superadmin_mfa_secret_path: "data/superadmin_mfa_secret.txt"

  # Application domain for SAML and OAuth callbacks
  # Used to generate default SP entity IDs and callback URLs
  app_domain: "app.boilstream.com"  # Your application domain (e.g., "app.example.com")

  # WebAuthn (Passkey) Configuration
  # Required for passwordless authentication with biometrics/security keys
  webauthn_rp_id: "localhost"           # Relying Party ID (domain name)
  webauthn_rp_origin: "https://localhost"  # Full origin URL (must match browser location)
  # For production, use your actual domain:
  # webauthn_rp_id: "example.com"
  # webauthn_rp_origin: "https://example.com"

  # Users database backup configuration (disaster recovery)
  # users_backup_backend: "noop-primary"    # Name of storage backend to use for backups
  # users_backup_interval_seconds: 60  # Minimum seconds between backups (default: 60)
  # users_backup_path: "auth/users.duckdb"  # Path in backend for backup file

  # Optional PGP encryption for deleted account emails (GDPR compliance)
  # When users delete their accounts, their email can be encrypted with PGP
  # before storage to comply with GDPR while preserving non-disputability
  # email_encryption_pgp_public_key_path: "/etc/boilstream/pgp/public.asc"
  # Or provide the PGP public key directly as a string:
  # email_encryption_pgp_public_key: |
  #   -----BEGIN PGP PUBLIC KEY BLOCK-----
  #   ...
  #   -----END PGP PUBLIC KEY BLOCK-----

# Cluster Mode Configuration
# Enables horizontal scaling with leader election and broker registry
# Required for cluster admin API endpoints (/auth/api/admin/cluster/*)
# Note: Requires S3/object store backend (not NoOp) to store cluster state
cluster_mode:
  enabled: true
  # Path to persistent node ID file (generated on first start, reused on restart)
  # Required for proper leader election after restart - without this, each restart
  # generates a new node_id and the node won't reclaim leadership
  node_id_path: "./node_id"
  advertised_host: "localhost"
  internal_api_port: 8444
  leader_heartbeat_interval_secs: 30
  leader_stale_threshold_secs: 120
  broker_heartbeat_interval_secs: 30
  broker_stale_threshold_secs: 120

# OAuth Providers Configuration
oauth_providers:
  # GitHub OAuth Configuration with RBAC
  # github:
  #   client_id: "${GITHUB_CLIENT_ID}"
  #   client_secret: "${GITHUB_CLIENT_SECRET}"
  #   redirect_uri: "https://yourdomain.com/auth/callback"
