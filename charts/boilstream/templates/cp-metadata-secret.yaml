{{- if .Values.cpMetadata.enabled }}
{{- if not .Values.clusterTls.enabled }}
{{- fail "cpMetadata.enabled=true requires clusterTls.enabled=true (mTLS is mandatory for cp-metadata)" }}
{{- end }}
{{- if not .Values.cpMetadata.existingTokenSecret }}
{{- if not .Values.cpMetadata.token }}
{{- fail "cpMetadata.enabled=true requires cpMetadata.token (or cpMetadata.existingTokenSecret with a `token` key)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: boilstream-cp-metadata
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boilstream.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.cpMetadata.token | quote }}
{{- end }}
{{- end }}
