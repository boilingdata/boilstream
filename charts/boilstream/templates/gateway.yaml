{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: boilstream
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boilstream.labels" . | nindent 4 }}
  {{- with .Values.gateway.serviceAnnotations }}
  annotations:
    # Envoy Gateway propagates these to the LB Service it provisions.
    {{- range $k, $v := . }}
    {{ $k | quote }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: pgwire
      protocol: TLS
      port: 5432
      tls: { mode: Passthrough }
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TLSRoute } ]
    - name: kafka
      protocol: TLS
      port: 9092
      tls: { mode: Passthrough }
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TLSRoute } ]
    # FlightRPC ingestion — Thread 1 port (flight_base_port + 1) is the
    # canonical external entry point (grpc+tls://<host>:50051). DuckDB
    # airport extension + ADBC FlightSQL clients connect here.
    - name: flight
      protocol: TLS
      port: 50051
      tls: { mode: Passthrough }
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TLSRoute } ]
    # FlightSQL consumer (server.consumer_flight_port 50250) — separate
    # Flight server for data consumption / read queries.
    - name: flightsql
      protocol: TLS
      port: 50250
      tls: { mode: Passthrough }
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TLSRoute } ]
    - name: auth
      protocol: TLS
      port: 8443
      tls: { mode: Passthrough }
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TLSRoute } ]
    # Standard HTTPS 443 — so browsers hitting https://<domain>/ reach
    # the web auth console without typing :8443. TLS passthrough routes
    # to the same per-pod :8443 auth backends (since the pod containers
    # bind :8443 unprivileged; we route :443 → :8443 at the LB).
    - name: auth-https
      protocol: TLS
      port: 443
      tls: { mode: Passthrough }
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TLSRoute } ]
    {{- /*
      Per-pod PgWire TCP passthrough (TCPRoute, NOT TLSRoute). Each listener
      is a pure L4 pipe from its LB port straight into one specific pod's
      :5432. Envoy doesn't parse TLS for these — the plaintext Postgres
      SSLRequest preamble reaches the pod unmolested, so libpq ≥9 (incl.
      DuckDB's bundled libpq <17) can connect with plain `sslmode=require`.
      The port we pick is `pgwire.publicTcpPortBase + pod_index` so clients
      compute it as `15432 + N` without coordination, matching
      `boilstream-N.{{ .Values.domain }}`.
    */}}
    {{- $tcpBase := int .Values.pgwire.publicTcpPortBase }}
    {{- range $i, $_ := until (int .Values.replicas) }}
    - name: pgwire-pod-{{ $i }}
      protocol: TCP
      port: {{ add $tcpBase $i }}
      allowedRoutes:
        namespaces: { from: Same }
        kinds: [ { kind: TCPRoute } ]
    {{- end }}
---
{{- $vals := . -}}
{{- /*
  Per-pod SNI TLSRoutes — kept for debugging and for clients that want to
  pin a specific pod (e.g. long-lived Kafka consumers that care about
  session stickiness across reconnects).
*/}}
{{- range $i, $_ := until (int .Values.replicas) }}
{{- range $listener := list "pgwire" "kafka" "flight" "flightsql" "auth" "auth-https" }}
{{- $port := index (dict "pgwire" 5432 "kafka" 9092 "flight" 50051 "flightsql" 50250 "auth" 8443 "auth-https" 8443) $listener }}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: boilstream-{{ $i }}-{{ $listener }}
  namespace: {{ $vals.Values.namespace }}
spec:
  parentRefs:
    - { name: boilstream, sectionName: {{ $listener }} }
  hostnames:
    - boilstream-{{ $i }}.{{ $vals.Values.domain }}
  rules:
    - backendRefs:
        - name: boilstream-{{ $i }}
          port: {{ $port }}
---
{{- end }}
{{- end }}

{{- /*
  Bare-hostname TLSRoutes — the default entry point users hit.
  SNI matches {{ .Values.domain }} and Envoy round-robins new TCP
  connections across all per-pod ClusterIP backends.

  Safe because every pod serves the same *.{{ .Values.domain }} wildcard
  cert, and boilstream's cluster mode lets any pod handle data-plane ops
  directly while brokers transparently forward catalog mutations to the
  leader over the :8444 internal API. PGWire sessions are TCP-sticky so
  prepared statements / transactions stay on the pod you landed on; a
  reconnect simply picks a new pod.
*/}}
{{- range $listener := list "pgwire" "kafka" "flight" "flightsql" "auth" "auth-https" }}
{{- $port := index (dict "pgwire" 5432 "kafka" 9092 "flight" 50051 "flightsql" 50250 "auth" 8443 "auth-https" 8443) $listener }}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: boilstream-any-{{ $listener }}
  namespace: {{ $vals.Values.namespace }}
spec:
  parentRefs:
    - { name: boilstream, sectionName: {{ $listener }} }
  hostnames:
    - {{ $vals.Values.domain }}
  rules:
    - backendRefs:
        {{- range $i, $_ := until (int $vals.Values.replicas) }}
        - name: boilstream-{{ $i }}
          port: {{ $port }}
          weight: 1
        {{- end }}
---
{{- end }}

{{- /*
  Per-pod PgWire TCPRoutes. One route per pod, each attached to its own
  dedicated TCP listener. No SNI, no hostname filtering — the listener
  itself has exactly one backend, so Envoy is a straight L4 proxy. Clients
  use `host=boilstream-N.{{ .Values.domain }} port={{ .Values.pgwire.publicTcpPortBase }}+N`
  and talk plain Postgres + SSLRequest upgrade to the pod.
*/}}
{{- $tcpBase := int .Values.pgwire.publicTcpPortBase }}
{{- range $i, $_ := until (int .Values.replicas) }}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: boilstream-{{ $i }}-pgwire-tcp
  namespace: {{ $vals.Values.namespace }}
spec:
  parentRefs:
    - { name: boilstream, sectionName: pgwire-pod-{{ $i }} }
  rules:
    - backendRefs:
        - name: boilstream-{{ $i }}
          port: 5432
---
{{- end }}
{{- end }}

