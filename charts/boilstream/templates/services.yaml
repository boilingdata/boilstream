apiVersion: v1
kind: Service
metadata:
  name: boilstream-headless
  namespace: {{ .Values.namespace }}
  labels:
    app: boilstream
    {{- include "boilstream.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: { app: boilstream }
  ports:
    - { name: pgwire,    port: 5432,  targetPort: 5432 }
    - { name: kafka,     port: 9092,  targetPort: 9092 }
    - { name: flight,    port: 50050, targetPort: 50050 }
    - { name: auth,      port: 8443,  targetPort: 8443 }
    - { name: cluster,   port: 8444,  targetPort: 8444 }
---
{{- range $i, $_ := until (int .Values.replicas) }}
apiVersion: v1
kind: Service
metadata:
  name: boilstream-{{ $i }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: boilstream
    pod-ordinal: "{{ $i }}"
    {{- include "boilstream.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: boilstream-{{ $i }}
  ports:
    - { name: pgwire,  port: 5432,  targetPort: 5432 }
    - { name: kafka,   port: 9092,  targetPort: 9092 }
    - { name: flight,  port: 50050, targetPort: 50050 }
    - { name: auth,    port: 8443,  targetPort: 8443 }
---
{{- end }}
