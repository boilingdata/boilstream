# Hetzner / CloudFleet K8s overlay — Helsinki (hel1) ARM64 nodes, Hetzner Object Storage.
#
# Ships with the public Docker Hub image by default so this file works
# unchanged for a fresh install. If you mirror to a private registry
# (e.g. your own CloudFleet CFCR tenant), override image.repository.
#
#   helm install boilstream ./charts/boilstream \
#     -f charts/boilstream/values-hetzner-example.yaml \
#     --set superadmin.existingSecret=boilstream-superadmin
#
# Private-registry variant:
#   helm install boilstream ./charts/boilstream \
#     -f charts/boilstream/values-hetzner-example.yaml \
#     --set image.repository=<your-cfcr-tenant>.europe.registry.cloudfleet.dev/boilstream \
#     --set image.tag=aarch64-linux-0.10.27 \
#     --set superadmin.existingSecret=boilstream-superadmin

replicas: 2                              # 2 nodes, 1 pod each
namespace: boilstream
namespaceCreate: true

image:
  # Public Docker Hub image — built on AWS EC2 Graviton 2 (c6gd) so the
  # baseline microarch is Neoverse N1. The same artefact runs on Hetzner
  # cax* / Oracle Ampere A1 / AWS Graviton 2/3/4 without SIGILLing on
  # SHA3 / SHA512 paths. There is no separate "-generic-" variant — this
  # is the only ARM64 image we publish.
  repository: docker.io/boilinginsights/boilstream
  tag: aarch64-linux-0.10.27
  pullPolicy: IfNotPresent
  pullSecrets: []                        # Docker Hub is public; no pull secret needed

domain: app.boilstream.com                  # local-test wildcard while we verify; swap for real domain in prod

# Hetzner Object Storage in Helsinki (S3-compatible).
s3:
  endpoint: https://hel1.your-objectstorage.com
  bucket: <your-hetzner-bucket-name>     # e.g. boilstream-cluster-state-hel1
  region: hel1
  prefix: cluster/
  # Path-style ({endpoint}/{bucket}/{key}) — current BoilStream/object_store
  # combo doesn't compose virtual-hosted URLs against Hetzner's endpoint correctly,
  # so the bucket falls out of the URL. Path-style is what works.
  forcePathStyle: true
  # S3 creds sourced from a pre-created Secret (keys: access_key, secret_key).
  # Create with: kubectl -n boilstream create secret generic boilstream-s3-creds \
  #   --from-literal=access_key=<...> --from-literal=secret_key=<...>
  existingCredsSecret: boilstream-s3-creds
  accessKey: ""
  secretKey: ""

# Conservative requests so Karpenter picks ARM cax21 (4 vCPU, 8 GB).
# 2 replicas × 1 vCPU/2 GB request = 2/4 GB per pool, leaves room for kube-system
# and chart-installed envoy/cert-manager pods on the same nodes. Total stays
# well under the 16 vCPU NodePool cap and the 24 vCPU fleet cap.
resources:
  requests: { cpu: "1",   memory: "2Gi" }
  limits:   { cpu: "2",   memory: "4Gi" }

# Pin to the Karpenter NodePool that fronts your Hetzner ARM64 fleet.
# Use the Karpenter-managed `karpenter.sh/nodepool` label rather than the
# CFKE-managed `boilstream.com/nodepool: arm64-hel` template label, because
# CFKE forbids customer modifications to NodePool requirements — and the
# `karpenter.sh/nodepool` label is auto-applied by Karpenter to every node
# it provisions, so freshly-spun nodes are picked up without an extra
# requirement on the NodePool spec. The value must match your actual
# NodePool's `metadata.name` (default in the CloudFleet bring-up flow is
# `boilstream-arm64-hel`).
nodeSelector:
  karpenter.sh/nodepool: boilstream-arm64-hel

# Soft anti-affinity — pods prefer separate nodes, but tolerate co-location
# during capacity churn. Hard `requiredDuringScheduling` caused a 3-way
# deadlock on CloudFleet: Karpenter's aggressive WhenEmptyOrUnderutilized
# consolidation taints nodes on any workload hiccup → pods can't land on
# tainted nodes → Karpenter tries to provision replacements → CFKE's locked
# NodePool CPU cap rejects → phantom NodeClaims accumulate and the cluster
# wedges. Preferring separate nodes (vs requiring) lets both pods co-locate
# on a single cax21 during churn while Karpenter's consolidation completes.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels: { app: boilstream }
          topologyKey: kubernetes.io/hostname

# Tolerate Karpenter's disruption taint so pods can temporarily schedule on
# nodes marked for drain. Without this, every consolidation cycle locks out
# new pods from every node Karpenter has decided to shrink, which (combined
# with a capped NodePool) creates the wedge above. Disrupting nodes still
# get drained and replaced — the toleration just lets pods ride the drain.
tolerations:
  - key: karpenter.sh/disrupted
    operator: Exists
    effect: NoSchedule

# Use existing Secret for the superadmin password + MFA secret. Both are managed
# out of band (kubectl create secret …) so they're never in Helm values output.
superadmin:
  existingSecret: boilstream-superadmin
  existingMfaSecret: boilstream-superadmin-mfa

# Test-mode hatches — only safe on clusters that are not serving real traffic.
# Disabling Turnstile lets the ingestion test suite sign up users via
# /auth/email/signup without a captcha token. Remove this block for production.
testMode:
  disableTurnstile: true

# TLS — keep self-signed CA for the test deploy; swap for Let's Encrypt + DNS-01
# (cert-manager Issuer) once a real domain is wired through.
tls:
  existingSecret: ""
  issuer:
    create: false
    name: letsencrypt-prod
    kind: ClusterIssuer

clusterTls:
  enabled: true
  existingSecret: ""
  issuer:
    name: boilstream-ca-issuer
    kind: ClusterIssuer

gateway:
  enabled: true
  className: eg
  serviceAnnotations: {}                 # CloudFleet provisions LoadBalancers via Hetzner LB

serviceAccount:
  create: true
  name: boilstream
  annotations: {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

terminationGracePeriodSeconds: 120
preStopSleepSeconds: 5
